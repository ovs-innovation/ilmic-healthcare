version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3095:3000"
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    environment:
      - NODE_ENV=production

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3096:5058"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5058

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "3097:80"
    env_file:
      - ./admin/.env
    restart: unless-stopped
